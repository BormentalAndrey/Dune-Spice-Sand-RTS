# .github/workflows/android-build.yml
name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest
    
    - name: Run Lint
      run: ./gradlew lintDebug
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Check keystore exists
      run: |
        if [ -f "app/my-release-key.jks" ]; then
          echo "✅ Keystore found at app/my-release-key.jks"
          ls -la app/my-release-key.jks
        else
          echo "❌ Keystore NOT found at app/my-release-key.jks"
          exit 1
        fi
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 7
    
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 7
    
    - name: Show Release Info
      run: |
        echo "✅ Release build successful!"
        echo "📦 APK size: $(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')"
        echo "📁 APK path: app/build/outputs/apk/release/app-release.apk"
        echo "📁 AAB path: app/build/outputs/bundle/release/app-release.aab"
